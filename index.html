<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Basit Hesap Makinesi - Modern Dark Calculator">
    <title>Basit Hesap Makinesi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="calculator-container" role="main" aria-label="Hesap Makinesi">
        <h1 class="visually-hidden">Basit Hesap Makinesi</h1>
        
        <!-- Display Screen Section -->
        <section class="display-section" aria-label="Ekran">
            <div id="display-screen" class="display-screen" role="status" aria-live="polite" aria-atomic="true">
                0
            </div>
        </section>
        
        <!-- Button Grid Section -->
        <section class="button-section" aria-label="Butonlar">
            <div class="button-grid" role="group" aria-label="Hesap makinesi tuş takımı">
                <!-- Row 1: Clear, Backspace, Modulo (or empty), Divide -->
                <button class="calc-btn btn-function" data-purpose="op-clear" onclick="clearDisplay()" aria-label="Temizle">C</button>
                <button class="calc-btn btn-function" data-purpose="op-backspace" onclick="deleteLast()" aria-label="Sil">⌫</button>
                <button class="calc-btn btn-function" data-purpose="op-percent" onclick="appendOperator('%')" aria-label="Yüzde">%</button>
                <button class="calc-btn btn-function" data-purpose="op-divide" onclick="appendOperator('/')" aria-label="Böl">÷</button>
                
                <!-- Row 2: 7, 8, 9, Multiply -->
                <button class="calc-btn btn-number" data-purpose="num-7" onclick="appendNumber('7')" aria-label="Yedi">7</button>
                <button class="calc-btn btn-number" data-purpose="num-8" onclick="appendNumber('8')" aria-label="Sekiz">8</button>
                <button class="calc-btn btn-number" data-purpose="num-9" onclick="appendNumber('9')" aria-label="Dokuz">9</button>
                <button class="calc-btn btn-function" data-purpose="op-multiply" onclick="appendOperator('*')" aria-label="Çarp">×</button>
                
                <!-- Row 3: 4, 5, 6, Subtract -->
                <button class="calc-btn btn-number" data-purpose="num-4" onclick="appendNumber('4')" aria-label="Dört">4</button>
                <button class="calc-btn btn-number" data-purpose="num-5" onclick="appendNumber('5')" aria-label="Beş">5</button>
                <button class="calc-btn btn-number" data-purpose="num-6" onclick="appendNumber('6')" aria-label="Altı">6</button>
                <button class="calc-btn btn-function" data-purpose="op-subtract" onclick="appendOperator('-')" aria-label="Çıkar">-</button>
                
                <!-- Row 4: 1, 2, 3, Add -->
                <button class="calc-btn btn-number" data-purpose="num-1" onclick="appendNumber('1')" aria-label="Bir">1</button>
                <button class="calc-btn btn-number" data-purpose="num-2" onclick="appendNumber('2')" aria-label="İki">2</button>
                <button class="calc-btn btn-number" data-purpose="num-3" onclick="appendNumber('3')" aria-label="Üç">3</button>
                <button class="calc-btn btn-function" data-purpose="op-add" onclick="appendOperator('+')" aria-label="Topla">+</button>
                
                <!-- Row 5: Zero (spans 2), Decimal, Equals -->
                <button class="calc-btn btn-number btn-zero" data-purpose="num-0" onclick="appendNumber('0')" aria-label="Sıfır">0</button>
                <button class="calc-btn btn-number" data-purpose="num-decimal" onclick="appendNumber('.')" aria-label="Ondalık nokta">.</button>
                <button class="calc-btn btn-equals" data-purpose="op-equals" onclick="calculate()" aria-label="Hesapla">=</button>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
